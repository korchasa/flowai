# Composite Skill Generation manifest (FR-SKILL-COMPOSE).
#
# Read by scripts/generate-skill-composites.ts (--check / --write modes).
# Excluded from framework.tar.gz by .github/workflows/ci.yml `tar --exclude`
# and re-checked by scripts/check-pack-refs.ts `--leakage` mode.
# Never shipped to user IDE configs.
schema_version: 1
atoms:
  plan:
    source: framework/atoms/plan.md
    target: framework/core/skills/plan/SKILL.md
    default_params:
      TERMINATION: TOTAL_STOP
  review:
    source: framework/atoms/review.md
    target: framework/core/skills/review/SKILL.md
  commit:
    source: framework/atoms/commit.md
    target: framework/core/commands/commit/SKILL.md
    default_params:
      DIFF_SOURCE: FRESH_READ
  implement:
    source: framework/atoms/implement.md
    target: framework/core/skills/implement/SKILL.md
    default_params:
      TERMINATION: TOTAL_STOP
  push:
    source: framework/atoms/push.md
    target: framework/core/commands/push/SKILL.md
    default_params:
      TERMINATION: TOTAL_STOP
composites:
  review-and-commit:
    target: framework/core/commands/review-and-commit/SKILL.md
    wrapper: framework/composites/review-and-commit.md
    phases:
      - title: Phase 1 — Review
        atom: review
      - title: Phase 2 — Commit
        atom: commit
        params:
          DIFF_SOURCE: REUSE_PRIOR_PHASE
  ship:
    target: framework/core/commands/ship/SKILL.md
    wrapper: framework/composites/ship.md
    phases:
      - title: Plan Phase
        atom: plan
        params:
          TERMINATION: HAND_OFF_TO_NEXT
      - title: Implement Phase
        atom: implement
        params:
          TERMINATION: HAND_OFF_TO_NEXT
      - title: Review Phase
        atom: review
      - title: Commit Phase
        atom: commit
        params:
          DIFF_SOURCE: REUSE_PRIOR_PHASE
      - title: Push Phase
        atom: push
        params:
          TERMINATION: TOTAL_STOP
