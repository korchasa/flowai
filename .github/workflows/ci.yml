name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x

      - name: Run checks
        run: deno task check

      - name: Verify no files modified by checks
        run: |
          if ! git diff --exit-code; then
            echo "::error::Unexpected file modifications detected after checks"
            git diff --stat
            exit 1
          fi
          if [ -n "$(git ls-files --others --exclude-standard)" ]; then
            echo "::error::Unexpected untracked files detected after checks"
            git ls-files --others --exclude-standard
            exit 1
          fi

      - name: Verify CLI install
        run: |
          deno task bundle
          deno install --global -A --config deno.json --name flowai ./cli/src/main.ts
          flowai --help

      - name: Verify no files modified before release
        run: |
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          if ! git diff --exit-code HEAD; then
            echo "::error::Working tree is dirty before release step"
            exit 1
          fi

      - name: Create release and push tags
        id: create-release
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'chore(release):')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            RELEASABLE=true
          else
            COMMITS=$(git log --oneline ${LATEST_TAG}..HEAD --grep="^feat\|^fix\|^perf\|^break\|^refactor\|^build" | wc -l)
            if [ "$COMMITS" -gt 0 ]; then RELEASABLE=true; else RELEASABLE=false; fi
          fi

          if [ "$RELEASABLE" = "true" ]; then
            deno task bundle
            deno task release
            git push --follow-tags origin main

            NEW_VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "Nothing to release"
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to JSR
        if: steps.create-release.outputs.released == 'true'
        run: |
          deno task bundle
          deno publish --allow-dirty

      - name: Create GitHub Release
        if: steps.create-release.outputs.released == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ steps.create-release.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
